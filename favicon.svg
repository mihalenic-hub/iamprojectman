<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">

  <!-- Background: brand dark, 4px radius -->
  <rect width="32" height="32" rx="4" fill="#171717"/>

  <!-- M mark: solid filled polygon — two arms with deep V-notch (83% depth), flat base -->
  <!-- Points: top-left peak → bottom-left → bottom-right → top-right peak → V-notch center -->
  <polygon
    points="4,5 4,23 28,23 28,5 16,20"
    fill="#ffffff"
  />

  <!-- Bridge line: same position and weight as previous design -->
  <line x1="4" y1="27" x2="28" y2="27" stroke="#525252" stroke-width="0.8"/>

</svg>
