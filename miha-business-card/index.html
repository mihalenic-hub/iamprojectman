<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Miha Lenič, EMBA — Project Manager</title>
  <meta name="description" content="Personal business card — Miha Lenič, EMBA. Project Manager at OMARNOR.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #000000;
      --white: #ffffff;
      --bg-dark: #171717;
      --card-dark: #262626;
      --text-primary: #000000;
      --text-secondary: #525252;
      --text-muted: #737373;
      --text-deemphasized: #a3a3a3;
      --border-light: #e5e5e5;
      --border-medium: #d4d4d4;
      --border-dark: #404040;
      --surface-subtle: #f5f5f5;
    }

    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--surface-subtle);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    /* ── Card ─────────────────────────────────────── */
    .card {
      width: 100%;
      max-width: 400px;
      background: var(--white);
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid var(--border-light);
    }

    /* ── Photo ────────────────────────────────────── */
    .card-photo {
      width: 100%;
      height: 280px;
      object-fit: cover;
      object-position: center 15%;
      display: block;
    }

    /* ── Content ──────────────────────────────────── */
    .card-body {
      padding: 1.75rem 2rem 2rem;
    }

    .eyebrow {
      font-size: 0.6875rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--text-deemphasized);
      margin-bottom: 0.5rem;
    }

    .name {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      line-height: 1.2;
      margin-bottom: 0.25rem;
    }

    .job-title {
      font-size: 0.9375rem;
      font-weight: 400;
      color: var(--text-muted);
      margin-bottom: 0;
    }

    .divider {
      height: 1px;
      background: var(--border-light);
      margin: 1.5rem 0;
    }

    /* ── Contact rows ─────────────────────────────── */
    .contact-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.875rem;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      text-decoration: none;
    }

    .contact-item:hover .contact-label {
      color: var(--text-primary);
    }

    .contact-icon {
      width: 36px;
      height: 36px;
      background: var(--surface-subtle);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .contact-icon svg {
      width: 16px;
      height: 16px;
      fill: var(--text-muted);
    }

    .contact-info {
      display: flex;
      flex-direction: column;
      gap: 0.0625rem;
    }

    .contact-type {
      font-size: 0.6875rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-deemphasized);
    }

    .contact-label {
      font-size: 0.9375rem;
      font-weight: 400;
      color: var(--text-secondary);
      transition: color 0.15s ease;
    }

    /* ── Download button ──────────────────────────── */
    .btn-download {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      padding: 0.9375rem 1.75rem;
      background: var(--black);
      color: var(--white);
      border: none;
      border-radius: 100px;
      font-family: 'Inter', sans-serif;
      font-size: 0.9375rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .btn-download:hover {
      background: var(--card-dark);
      transform: scale(1.02);
    }

    .btn-download svg {
      width: 16px;
      height: 16px;
      fill: var(--white);
      flex-shrink: 0;
    }

    /* ── Footer note ──────────────────────────────── */
    .card-footer {
      padding: 1rem 2rem 1.5rem;
      border-top: 1px solid var(--border-light);
      text-align: center;
    }

    .card-footer a {
      font-size: 0.75rem;
      color: var(--text-deemphasized);
      text-decoration: none;
      letter-spacing: 0.04em;
    }

    .card-footer a:hover {
      color: var(--text-muted);
    }

    @media (max-width: 440px) {
      body { padding: 1rem; align-items: flex-start; padding-top: 2rem; }
      .card { border-radius: 16px; }
      .card-photo { height: 240px; }
      .card-body { padding: 1.5rem 1.5rem 1.5rem; }
    }
  </style>
</head>
<body>

  <div class="card">

    <img
      class="card-photo"

              <svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                <path fill-rule="evenodd" d="M10 18a8 8 0 1 0 0-16 8 8 0 0 0 0 16ZM4.306 7.5a6.506 6.506 0 0 0-.142 1.5H6c.057-.765.163-1.5.314-2.18A7.518 7.518 0 0 1 4.306 7.5Zm.142 3.5c.16 1.064.505 2.017 1.004 2.82A6.51 6.51 0 0 0 7.614 13c-.213-.74-.37-1.565-.436-2.5H4.448Zm3.172 0c.073.964.253 1.807.503 2.5.463 1.288.995 1.75 1.777 1.75.782 0 1.314-.462 1.777-1.75.25-.693.43-1.536.503-2.5H7.62Zm5.762 0c-.065.935-.223 1.76-.436 2.5a6.51 6.51 0 0 0 2.164-.68A7.518 7.518 0 0 0 16.11 11h-2.728Zm2.863-3.5a7.518 7.518 0 0 1 .143 1.5H13.62c-.057-.765-.163-1.5-.314-2.18a7.518 7.518 0 0 0 2.165-.68A6.506 6.506 0 0 1 15.694 7.5Zm-3.19-1.68c-.213.38-.414.8-.589 1.26A10.19 10.19 0 0 1 11.37 7.5H8.63a10.19 10.19 0 0 1-.545-.42 8.184 8.184 0 0 0-.589-1.26C8.019 4.55 8.886 4 10 4c1.114 0 1.981.55 2.504 1.82ZM7.614 7.5H4.306a6.506 6.506 0 0 1 1.162-.82 7.518 7.518 0 0 1 2.164-.68c-.151.68-.257 1.415-.314 2.18a10.19 10.19 0 0 0 .296-.68Zm.89-3.32A6.51 6.51 0 0 0 6.34 4.86 8.015 8.015 0 0 1 7.558 4.3c.27.6.53 1.271.732 2.01-.22-.03-.44-.07-.657-.13Zm4.992 0a7.518 7.518 0 0 1 1.218.56c-.21-.04-.426-.08-.648-.13A11.04 11.04 0 0 0 12.496 4.18ZM12.38 7.5H7.62c.063-.96.24-1.81.49-2.5.462-1.288.994-1.75 1.89-1.75.896 0 1.428.462 1.89 1.75.25.69.427 1.54.49 2.5Z" clip-rule="evenodd"/>
              </svg>
            </span>
            <span class="contact-info">
              <span class="contact-type">Website</span>
              <span class="contact-label">iamprojectman.com</span>
            </span>
          </a>
        </li>

      </ul>

      <div class="divider"></div>

      <button class="btn-download" onclick="downloadVCard()">
        <svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
          <path fill-rule="evenodd" d="M3 17a1 1 0 0 1 1-1h12a1 1 0 1 1 0 2H4a1 1 0 0 1-1-1Zm3.293-7.707a1 1 0 0 1 1.414 0L9 10.586V3a1 1 0 1 1 2 0v7.586l1.293-1.293a1 1 0 1 1 1.414 1.414l-3 3a1 1 0 0 1-1.414 0l-3-3a1 1 0 0 1 0-1.414Z" clip-rule="evenodd"/>

    </div>

    <div class="card-footer">
      <a href="https://iamprojectman.com">iamprojectman.com</a>
    </div>

  </div>

  <script>
    function downloadVCard() {
      var vcard = [
        'BEGIN:VCARD',
        'VERSION:3.0',
        'FN:Miha Leni\u010d\\, EMBA',
        'N:Leni\u010d;Miha;;;EMBA',
        'ORG:IAMPROJECTMAN',
        'TITLE:Founder',
        'EMAIL;TYPE=INTERNET:miha@iamprojectman.com',
        'URL:https://iamprojectman.com',
        'X-SOCIALPROFILE;type=linkedin:https://www.linkedin.com/in/mihalenic/',
        'END:VCARD'
      ].join('\r\n');

      var blob = new Blob([vcard], { type: 'text/vcard;charset=utf-8' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'miha-lenic.vcf';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }
  </script>

</body>
</html>
