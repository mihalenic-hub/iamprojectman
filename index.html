<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miha Lenič — Bridge Sales & Delivery in Trade/Customs Tech</title>
    <meta name="description" content="I help Sales & BD teams in Trade/Customs Tech close deals that actually get delivered — using the 4-step Bridge Blueprint to align Sales, Delivery, and Legal before contract signature.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --black: #000000;
            --white: #ffffff;
            --gray-100: #f5f5f5;
            --gray-200: #e5e5e5;
            --gray-400: #a3a3a3;
            --gray-500: #737373;
            --gray-600: #525252;
            --gray-700: #404040;
            --gray-800: #262626;
            --gray-900: #171717;
        }

        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--white);
            color: var(--gray-900);
            line-height: 1.6;
        }

        /* ── LAYOUT ──────────────────────────────────────────── */
        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .section {
            padding: 5rem 0;
        }

        .section--dark {
            background: var(--gray-900);
            color: var(--white);
        }

        .section--subtle {
            background: var(--gray-100);
        }

        hr.divider {
            border: none;
            border-top: 1px solid var(--gray-200);
            margin: 0;
        }

        hr.divider--dark {
            border-color: var(--gray-700);
        }

        /* ── NAV ─────────────────────────────────────────────── */
        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--gray-200);
        }

        .nav-inner {
            max-width: 960px;
            margin: 0 auto;
            padding: 0 2rem;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-logo {
            font-size: 0.875rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--black);
            text-decoration: none;
        }

        .nav-cta {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            background: var(--black);
            color: var(--white);
            padding: 0.5rem 1.25rem;
            border-radius: 100px;
            font-size: 0.8125rem;
            font-weight: 500;
            text-decoration: none;
            transition: background 0.2s ease;
        }

        .nav-cta:hover {
            background: var(--gray-800);
        }

        /* ── HERO ─────────────────────────────────────────────── */
        .hero {
            padding: 6rem 0 5rem;
            text-align: center;
        }

        .hero-eyebrow {
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--gray-500);
            margin-bottom: 1.5rem;
        }

        .hero-headline {
            font-size: clamp(2.25rem, 5vw, 3.5rem);
            font-weight: 600;
            letter-spacing: -0.03em;
            line-height: 1.08;
            color: var(--black);
            margin-bottom: 1.5rem;
        }

        .hero-headline em {
            font-style: normal;
            color: var(--gray-500);
        }

        .hero-sub {
            font-size: 1.125rem;
            color: var(--gray-600);
            line-height: 1.6;
            max-width: 560px;
            margin: 0 auto 2.5rem;
        }

        .hero-sub strong {
            color: var(--gray-900);
            font-weight: 500;
        }

        .hero-actions {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 3rem;
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            background: var(--black);
            color: var(--white);
            padding: 0.9375rem 1.75rem;
            border-radius: 100px;
            font-size: 0.9375rem;
            font-weight: 500;
            text-decoration: none;
            transition: background 0.2s ease, transform 0.15s ease;
        }

        .btn-primary:hover {
            background: var(--gray-800);
            transform: scale(1.02);
        }

        .btn-secondary {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            background: transparent;
            color: var(--gray-700);
            padding: 0.9375rem 1.75rem;
            border-radius: 100px;
            border: 1px solid var(--gray-300, #d4d4d4);
            font-size: 0.9375rem;
            font-weight: 400;
            text-decoration: none;
            transition: border-color 0.2s ease, color 0.2s ease;
        }

        .btn-secondary:hover {
            border-color: var(--gray-500);
            color: var(--gray-900);
        }

        .trust-bar {
            font-size: 0.75rem;
            font-weight: 400;
            letter-spacing: 0.08em;
            color: var(--gray-400);
            text-transform: uppercase;
        }

        /* ── PROBLEM ──────────────────────────────────────────── */
        .section-label {
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--gray-400);
            margin-bottom: 1rem;
        }

        .section-label--light {
            color: var(--gray-600);
        }

        .section-title {
            font-size: clamp(1.5rem, 3vw, 2rem);
            font-weight: 600;
            letter-spacing: -0.025em;
            line-height: 1.15;
            margin-bottom: 1.5rem;
        }

        .section-title--white {
            color: var(--white);
        }

        .pain-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            margin: 2rem 0 2.5rem;
        }

        .pain-item {
            display: flex;
            gap: 1rem;
            align-items: flex-start;
        }

        .pain-num {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--gray-400);
            letter-spacing: 0.06em;
            min-width: 24px;
            padding-top: 0.1rem;
        }

        .pain-text {
            font-size: 1rem;
            color: var(--gray-800);
            line-height: 1.6;
        }

        .pain-text strong {
            color: var(--black);
            font-weight: 500;
        }

        .not-for-you {
            background: var(--gray-100);
            border-left: 2px solid var(--gray-300, #d4d4d4);
            padding: 1rem 1.25rem;
            border-radius: 0 8px 8px 0;
            font-size: 0.875rem;
            color: var(--gray-600);
            margin-top: 1rem;
        }

        /* ── FRAMEWORK ────────────────────────────────────────── */
        .framework-intro {
            font-size: 1rem;
            color: var(--gray-400);
            line-height: 1.7;
            max-width: 600px;
            margin-bottom: 3rem;
        }

        .steps {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .step-card {
            background: var(--gray-900);
            border-radius: 16px;
            padding: 1.75rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .step-number {
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--gray-600);
        }

        .step-name {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--white);
            letter-spacing: -0.01em;
        }

        .step-objective {
            font-size: 0.8125rem;
            color: var(--gray-500);
            line-height: 1.5;
        }

        .step-outcome {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--gray-400);
            padding-top: 0.5rem;
            border-top: 1px solid var(--gray-700);
        }

        .step-outcome span {
            color: var(--gray-300, #d4d4d4);
        }

        .step-badge {
            display: inline-block;
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--gray-500);
            background: var(--gray-800);
            border-radius: 100px;
            padding: 0.25rem 0.625rem;
            width: fit-content;
        }

        .timeline-note {
            font-size: 0.875rem;
            color: var(--gray-500);
            margin-bottom: 2rem;
        }

        .after-engagement {
            background: var(--gray-100);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2.5rem;
        }

        .after-title {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--gray-500);
            margin-bottom: 1.25rem;
        }

        .paths {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .path {
            background: var(--white);
            border-radius: 12px;
            padding: 1.25rem;
        }

        .path-label {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--gray-400);
            margin-bottom: 0.5rem;
        }

        .path-title {
            font-size: 0.9375rem;
            font-weight: 600;
            color: var(--black);
            margin-bottom: 0.375rem;
        }

        .path-desc {
            font-size: 0.8125rem;
            color: var(--gray-600);
            line-height: 1.5;
        }

        @media (max-width: 540px) {
            .paths {
                grid-template-columns: 1fr;
            }
        }

        /* ── RESULTS ──────────────────────────────────────────── */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 1rem;
            margin-bottom: 3rem;
        }

        .result-card {
            background: var(--gray-800);
            border-radius: 16px;
            padding: 1.75rem 1.5rem;
        }

        .result-market {
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--gray-500);
            margin-bottom: 0.75rem;
        }

        .result-headline {
            font-size: 1rem;
            font-weight: 500;
            color: var(--white);
            line-height: 1.45;
        }

        .markets-bar {
            font-size: 0.8125rem;
            color: var(--gray-500);
            margin-bottom: 3rem;
        }

        .markets-bar span {
            color: var(--gray-400);
        }

        .testimonials {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .testimonial {
            padding: 1.5rem;
            border: 1px solid var(--gray-700);
            border-radius: 16px;
        }

        .testimonial-quote {
            font-size: 0.9375rem;
            color: var(--gray-300, #d4d4d4);
            line-height: 1.6;
            margin-bottom: 1rem;
            font-style: italic;
        }

        .testimonial-author {
            font-size: 0.8125rem;
            font-weight: 500;
            color: var(--gray-500);
        }

        @media (max-width: 580px) {
            .testimonials {
                grid-template-columns: 1fr;
            }
        }

        /* ── ABOUT ────────────────────────────────────────────── */
        .about-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 3rem;
            align-items: start;
        }

        .about-credentials {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .credential {
            display: flex;
            flex-direction: column;
            gap: 0.125rem;
        }

        .credential-value {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: var(--black);
        }

        .credential-label {
            font-size: 0.75rem;
            color: var(--gray-500);
            font-weight: 400;
        }

        .about-text p {
            font-size: 1rem;
            color: var(--gray-700);
            line-height: 1.75;
            margin-bottom: 1rem;
        }

        .about-text p:last-child {
            margin-bottom: 0;
        }

        .about-text strong {
            color: var(--black);
            font-weight: 500;
        }

        .linkedin-link {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            color: var(--gray-600);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            margin-top: 1.5rem;
            transition: color 0.2s ease;
        }

        .linkedin-link:hover {
            color: var(--black);
        }

        @media (max-width: 640px) {
            .about-grid {
                grid-template-columns: 1fr;
                gap: 2rem;
            }

            .about-credentials {
                flex-direction: row;
                flex-wrap: wrap;
                gap: 1.5rem;
            }
        }

        /* ── CTA SECTION ──────────────────────────────────────── */
        .cta-section {
            text-align: center;
            padding: 5rem 0;
        }

        .cta-headline {
            font-size: clamp(1.5rem, 3vw, 2rem);
            font-weight: 600;
            letter-spacing: -0.025em;
            color: var(--white);
            margin-bottom: 0.75rem;
        }

        .cta-sub {
            font-size: 1rem;
            color: var(--gray-500);
            margin-bottom: 2.5rem;
        }

        .cta-actions {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .btn-primary--white {
            background: var(--white);
            color: var(--black);
        }

        .btn-primary--white:hover {
            background: var(--gray-200);
        }

        .btn-ghost {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            background: transparent;
            color: var(--gray-400);
            padding: 0.9375rem 1.75rem;
            border-radius: 100px;
            border: 1px solid var(--gray-700);
            font-size: 0.9375rem;
            font-weight: 400;
            text-decoration: none;
            transition: border-color 0.2s ease, color 0.2s ease;
        }

        .btn-ghost:hover {
            border-color: var(--gray-500);
            color: var(--white);
        }

        .cta-email {
            margin-top: 1.5rem;
            font-size: 0.8125rem;
            color: var(--gray-600);
        }

        .cta-email a {
            color: var(--gray-400);
            text-decoration: none;
        }

        .cta-email a:hover {
            color: var(--gray-200);
        }

        /* ── FOOTER ───────────────────────────────────────────── */
        footer {
            background: var(--black);
            border-top: 1px solid var(--gray-900);
            padding: 2rem 0;
        }

        .footer-inner {
            max-width: 960px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .footer-logo {
            font-size: 0.8125rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--gray-600);
        }

        .footer-links {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .footer-links a {
            font-size: 0.8125rem;
            color: var(--gray-600);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .footer-links a:hover {
            color: var(--gray-400);
        }

        .footer-copy {
            font-size: 0.75rem;
            color: var(--gray-700);
        }

        /* ── RESPONSIVE ───────────────────────────────────────── */
        @media (max-width: 768px) {
            .section {
                padding: 3.5rem 0;
            }

            .hero {
                padding: 4rem 0 3.5rem;
            }

            .steps {
                grid-template-columns: 1fr;
            }

            .footer-inner {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
